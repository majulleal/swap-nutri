name: swap_nutri
description: "Calculadora de substituicoes alimentares e controle nutricional"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.0.0

  # Estado
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Navegacao
  go_router: ^14.0.0

  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^0.70.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0

  # Utilidades
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.0

  # Lint
  very_good_analysis: ^6.0.0

  # Testing
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/images/onboarding/
